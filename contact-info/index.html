<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Information | ABS COMPANY INC.</title>
    <style>
        :root {
            --primary: #00f2ff;
            --bg: #0a0a0b;
            --card-bg: #111114;
            --text-main: #ffffff;
            --text-dim: #a0a0a8;
            --border: #1f1f23;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .brand-header {
            margin-bottom: 32px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        h1 {
            font-size: 1.5rem;
            letter-spacing: 1px;
            margin: 0;
            color: var(--primary);
            text-transform: uppercase;
        }

        .info-group {
            margin-bottom: 24px;
        }

        .label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-dim);
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }

        .value {
            font-size: 1.1rem;
            color: var(--text-main);
        }

        .value a {
            color: var(--primary);
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .value a:hover {
            text-decoration: underline;
        }

        .footer-note {
            margin-top: 40px;
            font-size: 0.85rem;
            color: var(--text-dim);
            text-align: center;
        }

        .nav-back {
            display: inline-block;
            margin-top: 20px;
            font-size: 0.8rem;
            color: var(--text-dim);
            text-decoration: none;
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 4px;
        }

        .nav-back:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
    </style>
</head>
<body>

    <main class="container">
        <div class="card">
            <header class="brand-header">
                <h1>ABS COMPANY INC.</h1>
            </header>

            <section class="info-group">
                <span class="label">Public Business Name</span>
                <div class="value">ABS COMPANY INC.</div>
            </section>

            <section class="info-group">
                <span class="label">Support Phone</span>
                <div class="value">
                    <a href="tel:+15168474658">+1 (516) 847-4658</a>
                </div>
            </section>

            <section class="info-group">
                <span class="label">Business Address</span>
                <div class="value">
                    159 2nd Street<br>
                    Jersey City, NJ 07302<br>
                    United States
                </div>
            </section>

            <center>
                <a href="/" class="nav-back">← Back to Labs</a>
            </center>
        </div>

        <footer class="footer-note">
            &copy; 2026 ABS COMPANY INC. All rights reserved.
        </footer>
    </main>

</body>
</html>
